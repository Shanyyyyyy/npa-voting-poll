<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Results - NPA Awards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <img src="NPA PIC.jpg" alt="NPA Logo" class="nav-logo" style="height: 50px;">
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="vote.html">Vote</a>
            <a href="results.html" class="active">Results</a>
            <a href="create.html">Admin</a>
        </div>
    </nav>

    <div class="container">
        <h1 style="color: var(--gold); font-family: 'Oswald', sans-serif; text-transform: uppercase;">Live Leaderboard</h1>
        <p style="color: #ccc; margin-bottom: 40px;">Real-time voting results for the 2026 NPA Season Awards.</p>
        
        <div id="officialSection" style="margin-bottom: 50px;">
            <h2 style="color: var(--gold); font-family: 'Oswald', sans-serif; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
                🏆 OFFICIAL NPA AWARDS
            </h2>
            <div id="officialResults" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;"></div>
        </div>

        <div id="communitySection">
            <h2 style="color: #ccc; font-family: 'Oswald', sans-serif; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
                🗣️ COMMUNITY CUSTOM BALLOTS
            </h2>
            <div id="communityResults" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;"></div>
        </div>
    </div>

    <script type="module" src="results.js"></script>
</body>
</html>
