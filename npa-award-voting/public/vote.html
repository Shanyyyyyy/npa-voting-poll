<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote - NPA Awards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-container">
            <img src="NPA PIC.jpg" alt="NPA Logo" class="nav-logo" style="height: 50px;">
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="vote.html" class="active">Vote</a>
            <a href="results.html">Results</a>
            <a href="create.html">Admin</a>
        </div>
    </nav>

    <div class="container" style="padding-bottom: 100px;"> <h1 style="color: var(--gold); font-family: 'Oswald', sans-serif; text-transform: uppercase;">Official Ballots</h1>
        <p style="color: #ccc; margin-bottom: 20px;">Review your selections and click Submit at the bottom to lock them in.</p>

        <div class="controls" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Search awards (e.g. MVP)..." style="flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white;">
            <select id="categoryFilter" style="padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white;">
                <option value="All">All Categories</option>
                <option value="Award">Awards</option>
            </select>
            <select id="statusFilter" style="padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white;">
                <option value="All">All Status</option>
                <option value="Open">Open</option>
                <option value="Closed">Closed</option>
            </select>
        </div>

        <div id="pollContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;"></div>
    </div>

    <div id="submitBar" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 10, 0.95); padding: 15px; text-align: center; border-top: 2px solid var(--gold); z-index: 1000; backdrop-filter: blur(5px);">
        <span id="pendingCount" style="color: white; margin-right: 15px; font-weight: bold; font-size: 1.1rem;">0 Pending Votes</span>
        <button id="submitAllBtn" style="background: var(--gold); color: black; font-weight: bold; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; transition: 0.3s;">
            🔒 SUBMIT BALLOT
        </button>
    </div>

    <script type="module" src="vote.js"></script>
</body>
</html>
